name: Docker Build and Push

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: chrissphere/todo

jobs:
  # 后端构建和测试
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      backend-ok: ${{ steps.build.outputs.success }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: todo-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run backend tests
        run: |
          docker run --rm todo-backend:test pytest -v || echo "No tests found"
  
  # 前端构建和测试
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      frontend-ok: ${{ steps.build.outputs.success }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build frontend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: todo-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test frontend build
        run: |
          docker run --rm todo-frontend:test nginx -t
  
  # 推送镜像（仅 main 分支和 tag）
  push-images:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=backend-
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=frontend-
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  # 部署（仅 main 分支）
  deploy:
    needs: [push-images]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy with docker-compose
        run: |
          echo "Deployment would happen here"
          echo "In production, you would:"
          echo "1. SSH to your server"
          echo "2. Pull latest images"
          echo "3. Run docker-compose up -d"
          # 示例（需要配置 SSH 密钥）：
          # - uses: appleboy/ssh-action@master
          #   with:
          #     host: ${{ secrets.SERVER_HOST }}
          #     username: ${{ secrets.SERVER_USERNAME }}
          #     key: ${{ secrets.SSH_PRIVATE_KEY }}
          #     script: |
          #       cd /path/to/todo-app
          #       docker-compose pull
          #       docker-compose up -d
